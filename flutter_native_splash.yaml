# Run:
# dart run flutter_native_splash:create --path=flutter_native_splash.yaml

flutter_native_splash:

  # Main Splash
  color: "#FFFFFF"
  image: assets/images/icon_splash.png

  # Dark Mode
  color_dark: "#000000"
  image_dark: assets/images/icon_splash.png

  # Platforms
  android: true
  ios: false

  # Fullscreen
  fullscreen: true

  # Android 12+
  android_12:
    color: "#FFFFFF"
    image: assets/images/icon_splash_padded.png

    color_dark: "#000000"
    image_dark: assets/images/icon_splash_padded.png