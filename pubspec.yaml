name: mindmate
description: MindMate Flutter application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_tts: ^4.2.5
  rename_app: ^1.6.6
  speech_to_text: ^7.4.0
  permission_handler: ^11.3.1
  flutter_riverpod: ^2.5.1
  sherpa_onnx: ^1.10.30
  audioplayers: ^6.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

